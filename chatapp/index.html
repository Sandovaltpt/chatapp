<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatApp</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div id="login-box">
    <div class="login-logo">💬</div>
    <h2>ChatApp</h2>
    <p>Ingresa tu nombre para comenzar</p>
    <input id="login-name" type="text" placeholder="Tu nombre…" maxlength="24" autocomplete="off"/>
    <button id="login-btn">Entrar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span id="sidebar-user">💬 ChatApp</span>
    </div>
    <div id="search-wrap">
      <input id="room-search" type="text" placeholder="🔍  Buscar sala…"/>
    </div>
    <div id="rooms-list"></div>
  </aside>

  <!-- CHAT PANEL -->
  <main id="chat-panel">

    <!-- placeholder -->
    <div id="no-room">
      <span>💬</span>
      <p>Selecciona una sala para chatear</p>
    </div>

    <!-- header (hidden until room selected) -->
    <header id="chat-header" class="hidden">
      <div id="header-avatar"></div>
      <div id="header-info">
        <h3 id="header-name"></h3>
        <small id="header-sub"></small>
      </div>
    </header>

    <!-- messages -->
    <div id="messages"></div>

    <!-- input bar (hidden until room selected) -->
    <div id="input-bar" class="hidden">
      <!-- Emoji -->
      <button class="icon-btn" id="emoji-btn" title="Emoji">😊</button>
      <div id="emoji-picker"></div>

      <!-- Photo upload -->
      <label class="icon-btn" id="photo-btn" title="Subir foto">
        📷
        <input type="file" id="photo-input" accept="image/*" style="display:none"/>
      </label>

      <!-- Text -->
      <textarea id="msg-input" rows="1" placeholder="Escribe un mensaje…"></textarea>

      <!-- Audio record -->
      <button class="icon-btn" id="audio-btn" title="Mantén presionado para grabar">🎤</button>

      <!-- Send -->
      <button id="send-btn" title="Enviar">➤</button>
    </div>

    <!-- Recording indicator -->
    <div id="rec-bar" class="hidden">
      <span id="rec-dot">⏺</span>
      <span id="rec-time">0:00</span>
      <span>Grabando… suelta para enviar, <button id="cancel-rec">cancelar</button></span>
    </div>

  </main>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
