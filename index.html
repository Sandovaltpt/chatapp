<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp</title>
    <meta http-equiv="refresh" content="0; url=http://localhost:3000" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loader {
        text-align: center;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #1e293b;
        border-top-color: #00a884;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      p {
        color: #64748b;
        font-size: 0.95rem;
      }
      a {
        color: #00a884;
        text-decoration: none;
      }
    </style>
    <script>
      // Redirige inmediatamente usando JS como fallback al meta refresh
      window.location.replace('http://localhost:3000');
    </script>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <p>Abriendo ChatApp… <a href="http://localhost:3000">Click aquí si no redirige</a></p>
    </div>
  </body>
</html>
